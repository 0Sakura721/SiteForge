<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业官网</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="/" class="logo">Company Name</a>
    <nav>
      <a href="#services">服务</a>
      <a href="#about">关于</a>
      <a href="#contact">联系</a>
    </nav>
  </div>
</header>
<section class="banner">
  <div class="container">
    <h1>专业解决方案 · 助力企业成长</h1>
    <p>我们提供一站式数字化服务，为您的业务注入新动能</p>
    <a href="#contact" class="btn">联系我们</a>
  </div>
</section>
<section id="services" class="section">
  <div class="container">
    <h2 class="section-title">我们的服务</h2>
    <div class="grid-3">
      <div class="card">
        <div class="card-icon">🌐</div>
        <h3>网站建设</h3>
        <p>响应式企业官网设计与开发，完美适配各类设备。</p>
      </div>
      <div class="card">
        <div class="card-icon">📱</div>
        <h3>移动应用</h3>
        <p>iOS/Android 原生与跨平台应用，覆盖全终端用户。</p>
      </div>
      <div class="card">
        <div class="card-icon">📊</div>
        <h3>数据分析</h3>
        <p>深度数据洞察与可视化，驱动精准业务决策。</p>
      </div>
    </div>
  </div>
</section>
<section id="contact" class="section section-dark">
  <div class="container">
    <h2 class="section-title">联系我们</h2>
    <div class="contact-info">
      <p>📧 email@company.com</p>
      <p>📞 400-000-0000</p>
      <p>📍 中国·北京</p>
    </div>
  </div>
</section>
<footer>
  <div class="container"><p>&copy; 2026 Company Name · Powered by SiteForge</p></div>
</footer>

</html>
