name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'debug'
        options:
          - debug
          - release
      version_name:
        description: '版本名称（release时使用）'
        required: false
        type: string
        default: '1.0.0'

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platforms;android-34 build-tools;34.0.0'

      - name: 生成 Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5

      - name: 赋予 gradlew 执行权限
        working-directory: android
        run: chmod +x gradlew

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 构建 Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 构建 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            ./gradlew assembleRelease --no-daemon -PversionName=${{ github.event.inputs.version_name }}
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: 收集 APK 产物
        run: |
          mkdir -p apk-output
          find android/app/build/outputs -name "*.apk" -exec cp {} apk-output/ \;
          echo "=== 生成的 APK 文件 ==="
          ls -lh apk-output/

      - name: 上传 APK (armeabi-v7a)
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SiteForge-armeabi-v7a-debug
          path: apk-output/*armeabi-v7a*.apk
          retention-days: 30

      - name: 上传 APK (arm64-v8a)
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SiteForge-arm64-v8a-debug
          path: apk-output/*arm64-v8a*.apk
          retention-days: 30

      - name: 上传 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: SiteForge-release
          path: apk-output/
          retention-days: 90
